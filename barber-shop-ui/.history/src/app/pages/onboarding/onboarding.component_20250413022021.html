<div class="onboarding-container">
  <mat-card>
    <mat-card-title>Informações do Cliente</mat-card-title>
    <mat-card-content>
      <form>
        <mat-form-field appearance="fill">
          <mat-label>Nome</mat-label>
          <input matInput type="text" required />
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Telefone</mat-label>
          <input matInput type="text" maxlength="11" required />
        </mat-form-field>

        <button mat-raised-button color="primary">Salvar</button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
