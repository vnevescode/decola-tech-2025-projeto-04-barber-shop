<div class="dashboard-container" [@fadeIn]>
  <mat-card class="dashboard-card">
    <mat-card-title>Agendar Corte</mat-card-title>
    <mat-card-content>
      <form [formGroup]="scheduleForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline">
          <mat-label>Data</mat-label>
          <input matInput formControlName="date" type="date" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Hora</mat-label>
          <input matInput formControlName="time" type="time" />
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Tipo de Corte</mat-label>
          <mat-select formControlName="haircutTypeId">
            <mat-option value="uuid-tipo1">Corte Clássico</mat-option>
            <mat-option value="uuid-tipo2">Barba</mat-option>
          </mat-select>
        </mat-form-field>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="scheduleForm.invalid"
        >
          Agendar
        </button>
      </form>
    </mat-card-content>
  </mat-card>

  <div class="calendar-container">
    <mwl-calendar-month-view
      [viewDate]="viewDate"
      [activeDayIsOpen]="true"
    ></mwl-calendar-month-view>
  </div>
</div>
