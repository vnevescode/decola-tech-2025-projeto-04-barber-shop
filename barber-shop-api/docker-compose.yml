services:
  app:
    build:
      context: .
    command: bash start-dev.sh
    environment:
      DB_URL: jdbc:postgresql://db:5432/barber-shop-api-db
      DB_USER: useradmin
      DB_PASSWORD: supersecure
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8084:8084"
      - "5005:5005"
    volumes:
      - .:/barber-shop-api:z
    depends_on:
      - db
    networks:
      - barber-shop-net
  db:
    image: postgres:13.4
    environment:
      POSTGRES_USER: useradmin
      POSTGRES_PASSWORD: supersecure
      POSTGRES_DB: barber-shop-api-db
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "5432:5432"
    networks:
      - barber-shop-net
networks:
  barber-shop-net:
    name: barber-shop-net
    external: true
volumes:
  db: