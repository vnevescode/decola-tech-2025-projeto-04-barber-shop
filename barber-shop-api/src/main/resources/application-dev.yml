spring:
  application:
    name: barber-shop-api-dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

  devtools:
    remote:
      secret: 123
    restart:
      trigger-file: trigger.txt

server:
  port: 8084